<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 등록</title>
</head>
<body>

<h1>게시글 등록</h1>

<form action="/article/create" method="post">
    <div>
        <label>제목</label>
        <input type="text" name="title">
    </div>
    <div>
        <label>내용</label>
        <textarea name="content" rows="10" cols="50"></textarea>
    </div>
    <button type="submit">등록</button>
</form>

</body>
</html>
