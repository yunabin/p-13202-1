<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
</head>
<body>

<h1>게시글 수정</h1>

<form th:action="@{/article/update/{id}(id=${article.id})}" method="post">
    <div>
        <label>제목</label>
        <input type="text" name="title" th:value="${article.title}">
    </div>
    <div>
        <label>내용</label>
        <textarea name="content" rows="10" cols="50" th:text="${article.content}"></textarea>
    </div>
    <button type="submit">수정완료</button>
</form>

</body>
</html>
